steps:
  # 1. Build frontend
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'cd frontend && npm ci --silent && npm run build'
    id: build-frontend

  # 2. Build & push Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-pulse-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/local-pulse-api:latest'
      - '.'
    id: build-docker
    waitFor: ['build-frontend']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/local-pulse-api:$COMMIT_SHA']
    id: push-docker
    waitFor: ['build-docker']

  # 3. Deploy backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'local-pulse-api'
      - '--image=gcr.io/$PROJECT_ID/local-pulse-api:$COMMIT_SHA'
      - '--region=europe-west1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=300'
      - '--update-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,GOOGLE_MAPS_API_KEY=GOOGLE_MAPS_API_KEY:latest'
      - '--quiet'
    id: deploy-backend
    waitFor: ['push-docker']

  # 4. Deploy frontend to Firebase Hosting
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools --silent
        firebase deploy --only hosting --project $PROJECT_ID --non-interactive
    id: deploy-frontend
    waitFor: ['build-frontend']

images:
  - 'gcr.io/$PROJECT_ID/local-pulse-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/local-pulse-api:latest'

timeout: '1200s'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
